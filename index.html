<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equilíbrio 365</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <button id="installBtn" class="installBtn" style="display:none;">
    ⬇️ Instalar Equilíbrio 365
  </button>

  <div id="app"><<script src="./js/ui.js?v=3"></script>
<script src="./js/content.js?v=3"></script>
<script src="./js/app.js?v=3"></script>
  <script>
    // Service Worker
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js"));
    }

    // PWA install prompt
    window.__pwa = { deferredPrompt: null, canInstall: false };

    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      window.__pwa.deferredPrompt = e;
      window.__pwa.canInstall = true;
      window.dispatchEvent(new Event("pwa-can-install"));
    });

    window.addEventListener("appinstalled", () => {
      window.__pwa.deferredPrompt = null;
      window.__pwa.canInstall = false;
      window.dispatchEvent(new Event("pwa-installed"));
    });
  </script>
</body>
</html>
